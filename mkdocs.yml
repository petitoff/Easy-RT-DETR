site_name: Easy-RT-DETR Docs
site_description: Dokumentacja rozwoju Easy-RT-DETR i statusu implementacji RT-DETRv3 w PyTorch.
repo_url: https://github.com/petitoff/Easy-RT-DETR
site_url: https://petitoff.github.io/Easy-RT-DETR/
repo_name: petitoff/Easy-RT-DETR
theme:
  name: material
  language: pl
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
nav:
  - Start: index.md
  - Architektura: architecture.md
  - Eksperymenty i Wyniki: experiments.md
  - Zdalny Trening GPU: remote-training.md
  - Status i Roadmapa: status.md
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
